<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blood Bank Management System - Secure login portal for managing blood donations, inventory, and donor records.">
    <title>BloodBank MS — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated floating blood cells background -->
    <div class="bg-animation" aria-hidden="true">
        <div class="cell cell-1"></div>
        <div class="cell cell-2"></div>
        <div class="cell cell-3"></div>
        <div class="cell cell-4"></div>
        <div class="cell cell-5"></div>
        <div class="cell cell-6"></div>
    </div>

    <main class="login-container">
        <!-- Left Panel - Branding -->
        <section class="branding-panel" aria-label="Branding">
            <div class="branding-content">
                <div class="brand-logo-large">
                    <svg viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-drop-large" aria-hidden="true">
                        <path d="M32 0C32 0 0 40 0 54C0 68.36 14.33 80 32 80C49.67 80 64 68.36 64 54C64 40 32 0 32 0Z" fill="url(#dropGradLg)"/>
                        <rect x="26" y="38" width="12" height="32" rx="2" fill="white" opacity="0.95"/>
                        <rect x="16" y="48" width="32" height="12" rx="2" fill="white" opacity="0.95"/>
                        <defs>
                            <linearGradient id="dropGradLg" x1="32" y1="0" x2="32" y2="80" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#EF4444"/>
                                <stop offset="1" stop-color="#B91C1C"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="brand-title">BloodBank<span class="brand-accent">MS</span></h1>
                <p class="brand-tagline">Saving Lives, One Drop at a Time</p>
                <div class="brand-features">
                    <div class="feature-item">
                        <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        <span>Real-time Inventory Tracking</span>
                    </div>
                    <div class="feature-item">
                        <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        <span>Donor Management System</span>
                    </div>
                    <div class="feature-item">
                        <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        <span>Secure & HIPAA Compliant</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Panel - Login Form -->
        <section class="login-panel" aria-label="Login">
            <div class="login-form-wrapper">
                <!-- Mobile logo (visible only on small screens) -->
                <div class="mobile-logo">
                    <svg viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-drop-sm" aria-hidden="true">
                        <path d="M32 0C32 0 0 40 0 54C0 68.36 14.33 80 32 80C49.67 80 64 68.36 64 54C64 40 32 0 32 0Z" fill="url(#dropGradSm)"/>
                        <rect x="26" y="38" width="12" height="32" rx="2" fill="white" opacity="0.95"/>
                        <rect x="16" y="48" width="32" height="12" rx="2" fill="white" opacity="0.95"/>
                        <defs>
                            <linearGradient id="dropGradSm" x1="32" y1="0" x2="32" y2="80" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#EF4444"/>
                                <stop offset="1" stop-color="#B91C1C"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <h2 class="mobile-brand">BloodBank<span class="brand-accent">MS</span></h2>
                </div>

                <div class="form-header">
                    <h2 class="form-title">Welcome Back</h2>
                    <p class="form-subtitle">Sign in to your account to continue</p>
                </div>

                <form id="loginForm" class="login-form" novalidate>
                    <div class="input-group" id="emailGroup">
                        <label for="email" class="input-label">Email Address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="3"/>
                                <path d="M22 5L12 13L2 5"/>
                            </svg>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="you@hospital.org" 
                                autocomplete="email"
                                required
                            >
                        </div>
                        <span class="input-error" id="emailError" role="alert"></span>
                    </div>

                    <div class="input-group" id="passwordGroup">
                        <label for="password" class="input-label">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="3"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                <circle cx="12" cy="16.5" r="1.5"/>
                            </svg>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Enter your password" 
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                        <span class="input-error" id="passwordError" role="alert"></span>
                    </div>

                    <div class="form-options">
                        <label class="remember-me" for="rememberMe">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span class="checkmark"></span>
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                        <div class="btn-loader" style="display:none">
                            <div class="spinner"></div>
                        </div>
                    </button>
                </form>

                <div class="form-footer">
                    <p>Don't have an account? <a href="#" id="signupLink" class="signup-link">Contact Admin</a></p>
                </div>

                <div class="security-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="shield-icon">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        <polyline points="9 12 11 14 15 10"/>
                    </svg>
                    <span>256-bit SSL Encrypted</span>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
