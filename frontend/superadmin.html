<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodBank MS — Super Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .bank-card { display: flex; align-items: center; justify-content: space-between; background: var(--white); padding: 1.25rem; border-radius: var(--radius-md); border: 1px solid var(--slate-200); margin-bottom: 1rem; }
        .bank-info h3 { font-size: 1rem; color: var(--slate-800); margin-bottom: 0.25rem; }
        .bank-info p { font-size: 0.82rem; color: var(--slate-500); }
        .system-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    </style>
</head>
<body class="dashboard-body">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg viewBox="0 0 64 80" width="28"><path d="M32 0C32 0 0 40 0 54C0 68.36 14.33 80 32 80C49.67 80 64 68.36 64 54C64 40 32 0 32 0Z" fill="#EF4444"/></svg>
                <span class="sidebar-brand">BB<span class="brand-accent">MS</span> Super</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item active"><a href="#" class="nav-link" data-section="reports"><span class="nav-text">System Reports</span></a></li>
                <li class="nav-item"><a href="#" class="nav-link" data-section="banks"><span class="nav-text">Manage Banks</span></a></li>
                <li class="nav-item"><a href="#" class="nav-link" data-section="users"><span class="nav-text">System Users</span></a></li>
            </ul>
            <ul class="nav-list nav-list-bottom"><li class="nav-item"><a href="#" class="nav-link nav-logout" id="navLogout"><span class="nav-text">Logout</span></a></li></ul>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="top-navbar">
            <div class="navbar-left">
                <h1 class="page-title">Super Admin Control</h1>
                <p class="page-subtitle">Global Inventory & Bank Management</p>
            </div>
            <div class="navbar-right">
                <div class="user-profile"><div class="user-avatar">SA</div><div class="user-info"><span class="user-name">Super Admin</span></div></div>
            </div>
        </header>

        <main class="dashboard-content">
            <!-- REPORTS SECTION -->
            <section id="sectionReports">
                <div class="system-stats">
                    <div class="stat-card"><div><span class="stat-value" id="valUnits">0</span><span class="stat-label">Units (Global)</span></div></div>
                    <div class="stat-card"><div><span class="stat-value" id="valBanks">0</span><span class="stat-label">Linked Banks</span></div></div>
                    <div class="stat-card"><div><span class="stat-value" id="valTransfers">0</span><span class="stat-label">Ongoing Transfers</span></div></div>
                </div>
                <div class="grid-2">
                    <div class="section-block"><h3>Inventory by Bank</h3><div class="table-wrap"><table class="data-table"><thead><tr><th>Bank</th><th>Units</th></tr></thead><tbody id="bankInvBody"></tbody></table></div></div>
                    <div class="section-block"><h3>Recent Donations (Global)</h3><div class="table-wrap"><table class="data-table"><thead><tr><th>Donor</th><th>Group</th><th>Date</th></tr></thead><tbody id="globalDonationBody"></tbody></table></div></div>
                </div>
            </section>

            <!-- BANKS SECTION -->
            <section id="sectionBanks" style="display:none">
                <div class="quick-actions" style="margin-bottom:1.5rem"><button class="action-btn action-add" id="btnAddBank">Add New Blood Bank</button></div>
                <div id="banksList"></div>
            </section>

            <!-- USERS SECTION -->
            <section id="sectionUsers" style="display:none">
                <div class="section-block">
                    <div class="table-wrap"><table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Bank ID</th></tr></thead><tbody id="usersTableBody"></tbody></table></div>
                </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header"><h3 id="modalTitle">Modal</h3></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer"><button class="modal-btn modal-btn-secondary" id="modalCancel">Cancel</button><button class="modal-btn modal-btn-primary" id="modalSubmit">Save</button></div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!checkAuth(['superadmin'])) return;
            
            async function load() {
                const [rep, banks, users] = await Promise.all([apiCall('/reports/summary'), apiCall('/banks'), apiCall('/users')]);
                
                // Reports
                document.getElementById('valUnits').textContent = rep.total_units;
                document.getElementById('valBanks').textContent = rep.total_banks;
                document.getElementById('valTransfers').textContent = rep.active_transfers;
                document.getElementById('bankInvBody').innerHTML = rep.inventory_by_bank.map(b => `<tr><td>${b.bank_name}</td><td>${b.total} units</td></tr>`).join('');
                document.getElementById('globalDonationBody').innerHTML = rep.recent_donations.map(d => `<tr><td>${d.donor_name}</td><td>${d.blood_group}</td><td>${formatDate(d.collection_date)}</td></tr>`).join('');
                
                // Banks
                document.getElementById('banksList').innerHTML = banks.banks.map(b => `<div class="bank-card"><div class="bank-info"><h3>${b.name}</h3><p>${b.location}</p></div><div>${b.phone || ''}</div></div>`).join('');
                
                // Users
                document.getElementById('usersTableBody').innerHTML = users.users.map(u => `<tr><td>${u.user_id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td><td>${u.bank_id || 'Global'}</td></tr>`).join('');
            }

            // Nav
            document.querySelectorAll('.nav-link[data-section]').forEach(l => l.addEventListener('click', e => {
                e.preventDefault();
                const s = l.dataset.section;
                document.querySelectorAll('section').forEach(sec => sec.style.display = 'none');
                document.getElementById('section' + s.charAt(0).toUpperCase() + s.slice(1)).style.display = 'block';
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                l.parentElement.classList.add('active');
            }));

            document.getElementById('navLogout').onclick = logout;
            
            const modal = document.getElementById('modalOverlay');
            document.getElementById('modalCancel').onclick = () => modal.classList.remove('active');
            document.getElementById('btnAddBank').onclick = () => {
                document.getElementById('modalTitle').textContent = 'Add New Bank';
                document.getElementById('modalBody').innerHTML = '<div class="modal-field"><label>Bank Name</label><input id="bName"></div><div class="modal-field"><label>Location</label><input id="bLoc"></div><div class="modal-field"><label>Phone</label><input id="bPhone"></div>';
                modal.classList.add('active');
                document.getElementById('modalSubmit').onclick = async () => {
                   await apiCall('/banks', { method:'POST', body: JSON.stringify({ name: document.getElementById('bName').value, location: document.getElementById('bLoc').value, phone: document.getElementById('bPhone').value }) });
                   modal.classList.remove('active'); load();
                };
            };

            load();
        });
    </script>
</body>
</html>
